# ── Server ────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database ──────────────────────────────────────────────────
# Locally uses H2. On Railway, DATABASE_URL env var is set
# automatically and PostgreSQL is used instead.

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:trshkpi;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USERNAME:admin}
spring.datasource.password=${DATABASE_PASSWORD:trsh2026}

# ── JPA ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Handles both H2 locally and PostgreSQL on Railway
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.H2Dialect}

# ── H2 console (local dev only) ───────────────────────────────
spring.h2.console.enabled=${H2_CONSOLE:true}
spring.h2.console.path=/h2-console

# ── Thymeleaf ─────────────────────────────────────────────────
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ── Session ───────────────────────────────────────────────────
server.servlet.session.timeout=8h