<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRSH KPI System — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1a1a1a;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo h1 {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .login-logo p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .login-card {
      background: #fff;
      border: 0.5px solid #e0e0dc;
      border-radius: 14px;
      padding: 28px;
    }

    .login-card h2 {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 20px;
    }

    .form-row {
      margin-bottom: 14px;
    }

    .form-row label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 5px;
    }

    .form-row input {
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      border: 0.5px solid #ccc;
      font-size: 14px;
      font-family: inherit;
      color: #1a1a1a;
      background: #fff;
      transition: border-color .15s;
    }

    .form-row input:focus {
      outline: none;
      border-color: #1a2744;
    }

    .btn-login {
      width: 100%;
      padding: 10px;
      background: #1a2744;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity .15s;
    }

    .btn-login:hover { opacity: .88; }

    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .alert-error {
      background: #fcebeb;
      color: #a32d2d;
      border: 0.5px solid #f09595;
    }

    .alert-success {
      background: #eaf3de;
      color: #3b6d11;
      border: 0.5px solid #b5d97a;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="login-wrap">

    <div class="login-logo">
      <h1>TRSH Youth Academy</h1>
      <p>Cadet KPI Management System</p>
    </div>

    <div class="login-card">
      <h2>Sign in to your account</h2>

      <!-- Error message -->
      <div th:if="${error}" class="alert alert-error"
        th:text="${error}"></div>

      <!-- Logout success message -->
      <div th:if="${message}" class="alert alert-success"
        th:text="${message}"></div>

      <form method="post" action="/login">

        <!-- CSRF token — required by Spring Security -->
        <input type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}">

        <div class="form-row">
          <label for="username">Username</label>
          <input type="text" id="username" name="username"
            placeholder="Enter your username"
            autocomplete="username"
            required autofocus>
        </div>

        <div class="form-row">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required>
        </div>

        <button type="submit" class="btn-login">
          Sign in
        </button>

      </form>
    </div>

    <div class="login-footer">
      TRSH Institution · 2026
    </div>

  </div>

</body>
</html>
